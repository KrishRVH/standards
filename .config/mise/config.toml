[settings]
lockfile = true

[tools]
gitleaks = "8.30.1"
python = "3.14.6"

[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks.lock]
description = "Refresh the root mise lockfile after tool-version changes"
run = "mise lock"

[tasks."standards:drift"]
description = "Check standards profile manifest and fixture drift"
run = "scripts/check-standards-drift.py"

[tasks.secrets]
description = "Scan the standards repository for secrets"
run = "gitleaks dir . --redact --no-banner"

[tasks."testers:standards"]
description = "Run all tester mini projects through their standards autofixes"
run = """
set -eu

root="$(pwd)"
projects="$(scripts/check-standards-drift.py --list-testers)"
if [ -z "$projects" ]; then
  echo "No tester projects found in standards.manifest.toml." >&2
  exit 1
fi

printf '%s\n' "$projects" | while IFS= read -r project; do
  echo "==> $project"
  (
    cd "$project"
    env -u GOROOT -u GOTOOLDIR MISE_TRUSTED_CONFIG_PATHS="$root" mise run standards
  )
done
"""

[tasks."testers:standards:check"]
description = "Run all tester mini projects through their standards CI gates"
run = """
set -eu

root="$(pwd)"
projects="$(scripts/check-standards-drift.py --list-testers)"
if [ -z "$projects" ]; then
  echo "No tester projects found in standards.manifest.toml." >&2
  exit 1
fi

printf '%s\n' "$projects" | while IFS= read -r project; do
  echo "==> $project"
  (
    cd "$project"
    env -u GOROOT -u GOTOOLDIR MISE_TRUSTED_CONFIG_PATHS="$root" mise run standards:check
  )
done
"""

[tasks."testers:standards:check:isolated"]
description = "Run the Python fixture standards gate in Dagger"
run = """
set -eu
root="$(pwd)"
cd testers/python
MISE_TRUSTED_CONFIG_PATHS="$root" mise run dagger:standards:check
"""

[tasks.standards]
description = "Run the standards repository autofix workflow"
depends = ["shell:standards", "testers:standards"]

[tasks."standards:check"]
description = "Run the standards repository CI gate"
depends = ["secrets", "standards:drift", "shell:standards:check", "testers:standards:check"]
