[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks."testers:check"]
description = "Run all tester mini projects through mise"
run = """
set -eu

root="$(pwd)"
for project in testers/c testers/csharp testers/cpp testers/elixir testers/go testers/haskell testers/kotlin testers/lua testers/php testers/python testers/rust testers/ts testers/zig; do
  echo "==> $project"
  (
    cd "$project"
    MISE_TRUSTED_CONFIG_PATHS="$root" mise run check:local
  )
done
"""

[tasks.check]
description = "Run the standards repository verification gate"
depends = ["testers:check"]
