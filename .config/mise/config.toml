[settings]
lockfile = true

[tools]
python = "3.14.6"

[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks.lock]
description = "Refresh the root mise lockfile after tool-version changes"
run = "mise lock"

[tasks."standards:drift"]
description = "Check standards profile manifest and fixture drift"
run = "scripts/check-standards-drift.py"

[tasks."testers:check"]
description = "Run all tester mini projects through mise"
run = """
set -eu

root="$(pwd)"
projects="$(scripts/check-standards-drift.py --list-testers)"
if [ -z "$projects" ]; then
  echo "No tester projects found in standards.manifest.toml." >&2
  exit 1
fi

printf '%s\n' "$projects" | while IFS= read -r project; do
  echo "==> $project"
  (
    cd "$project"
    MISE_TRUSTED_CONFIG_PATHS="$root" mise run check:local
  )
done
"""

[tasks.check]
description = "Run the standards repository verification gate"
depends = ["standards:drift", "testers:check"]
