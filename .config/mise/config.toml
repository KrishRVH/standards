min_version = "2026.7.0"
monorepo_root = true

[monorepo]
config_roots = ["testers/*"]
lockfile = false

[settings]
jobs = 2
lockfile = true

[tools]
biome = "2.5.3"
gitleaks = "8.30.1"
python = "3.14.6"

[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks.lock]
description = "Refresh the root mise lockfile after tool-version changes"
run = "mise lock"

[tasks."standards:biome:check"]
description = "Validate the optional Biome TypeScript template"
dir = "TS"
run = "biome ci --error-on-warnings --reporter=concise --vcs-root=.. biome.jsonc package.json src tests tsconfig.json"

[tasks."standards:drift"]
description = "Check standards profile manifest and fixture drift"
run = "scripts/check-standards-drift.py"

[tasks.secrets]
description = "Scan the standards repository for secrets"
run = "gitleaks dir . --redact --no-banner"

# mise 2026.7.x executes monorepo task paths natively but its validator does
# not resolve them in depends/structured run entries. Keep one bounded child
# scheduler until validation supports those references.
[tasks."testers:standards"]
description = "Run all tester mini projects through their standards autofixes"
run = "env -u GOROOT -u GOTOOLDIR mise run //testers/...:standards"

[tasks."testers:standards:check"]
description = "Run all tester mini projects through their standards CI gates"
run = "env -u GOROOT -u GOTOOLDIR mise run //testers/...:standards:check"

[tasks."testers:standards:check:isolated"]
description = "Run the Python fixture standards gate in Dagger"
run = "mise run //testers/python:dagger:standards:check"

[tasks.standards]
description = "Run the standards repository autofix workflow"
run = [
  { task = "md:standards" },
  { task = "shell:standards" },
  { task = "testers:standards" },
]

[tasks."standards:check"]
description = "Run the standards repository CI gate"
depends = [
  "secrets",
  "standards:biome:check",
  "standards:drift",
  "md:standards:check",
  "shell:standards:check",
  "testers:standards:check",
]
