[tools]
bun = "1.3.14"
lychee = "0.24.2"
typos = "1.48.0"

[tasks."md:install"]
description = "Install Bun-managed Markdown/MDX dependencies"
wait_for = ["md:lock:check"]
run = """
if [ -f bun.lock ]; then
  bun install --frozen-lockfile
else
  bun install
fi
"""

[tasks."md:lock"]
description = "Refresh the Bun lockfile for Markdown/MDX tooling"
run = "bun install"

[tasks."md:lock:check"]
description = "Ensure the Markdown/MDX Bun lockfile is present"
run = """
if [ ! -f bun.lock ]; then
  echo "bun.lock is required for Markdown/MDX CI. Run mise run md:lock and commit the generated lockfile." >&2
  exit 1
fi
"""

[tasks."md:run"]
description = "Run a Bun Markdown/MDX package script: mise run md:run -- <script>"
usage = "arg \"script\""
run = "bun run \"$usage_script\""

[tasks."md:fmt"]
description = "Format Markdown and MDX"
depends = ["md:install"]
run = "bun run format"

[tasks."md:fmt:check"]
description = "Check Markdown and MDX formatting"
depends = ["md:install"]
run = "bun run format:check"

[tasks."md:lint"]
description = "Lint Markdown and MDX structure"
depends = ["md:install"]
run = "bun run lint"

[tasks."md:lint:fix"]
description = "Fix Markdown and MDX lint issues"
depends = ["md:install"]
run = "bun run lint:fix"

[tasks."md:mdx:check"]
description = "Compile-check MDX with frontmatter, GFM, and Shiki plugins"
depends = ["md:install"]
run = "bun run mdx:check"

[tasks."md:links"]
description = "Check local Markdown/MDX/HTML links without network access"
run = "lychee --config lychee.toml --root-dir \"$PWD\" --offline --extensions md,mdx,html ."

[tasks."md:links:deep"]
description = "Check local and external Markdown/MDX/HTML links"
run = "lychee --config lychee.toml --root-dir \"$PWD\" --cache --extensions md,mdx,html ."

[tasks."md:typos"]
description = "Check Markdown/MDX prose and filenames for typos"
run = "typos --config typos.toml ."

[tasks."md:test"]
description = "Run Markdown/MDX smoke tests"
depends = ["md:mdx:check"]

[tasks."md:audit"]
description = "Audit Markdown/MDX tooling dependencies"
depends = ["md:install"]
run = "bun run audit"

[tasks."md:standards"]
description = "Run the Markdown/MDX standards workflow with autofixes"
depends = ["md:install"]
run = "bun run standards"

[tasks."md:standards:check"]
description = "Run the Markdown/MDX standards CI gate"
depends = ["md:lock:check", "md:install", "md:links", "md:typos"]
run = "bun run standards:check"

[tasks."md:standards:check:deep"]
description = "Run the Markdown/MDX CI gate plus external link and dependency checks"
depends = ["md:standards:check", "md:links:deep", "md:audit"]
