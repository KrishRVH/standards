[tools]
dotnet = "10.0.301"

[tasks."csharp:restore"]
description = "Restore .NET dependencies"
run = """
if find . -maxdepth 4 -name packages.lock.json -print -quit | grep -q .; then
  dotnet restore --locked-mode
else
  dotnet restore --use-lock-file
fi
"""

[tasks."csharp:fmt"]
description = "Format C# code"
depends = ["csharp:restore"]
run = "dotnet format --no-restore"

[tasks."csharp:fmt:check"]
description = "Check C# formatting"
depends = ["csharp:restore"]
run = "dotnet format --verify-no-changes --no-restore"

[tasks."csharp:lint"]
description = "Build C# with analyzers enabled"
depends = ["csharp:restore"]
run = "dotnet build --no-restore --configuration Release -warnaserror -p:ContinuousIntegrationBuild=true -p:TreatWarningsAsErrors=true"

[tasks."csharp:test"]
description = "Run C# tests"
depends = ["csharp:restore"]
run = "dotnet test --no-restore --configuration Release"

[tasks."csharp:standards"]
description = "Run the C# standards workflow with autofixes"
run = "mise run csharp:fmt"

[tasks."csharp:standards:check"]
description = "Run the C# standards CI gate"
run = """
mise run csharp:fmt:check
mise run csharp:lint
mise run csharp:test
"""
