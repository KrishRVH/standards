[tools]
godot = "4.7-stable"
python = "3.12.11"
uv = "0.11.23"

[tasks."godot:lock"]
description = "Lock GDToolkit for every supported platform"
run = """
uv pip compile \
  --quiet \
  --upgrade \
  --python-version 3.12 \
  --universal \
  --format pylock.toml \
  --custom-compile-command "mise run godot:lock" \
  --output-file .config/python/pylock.gdtoolkit.toml \
  .config/python/gdtoolkit-requirements.in
"""

[tasks."godot:lock:check"]
description = "Ensure the GDToolkit lock is present and current"
run = '''
set -eu
lock=.config/python/pylock.gdtoolkit.toml
if [ ! -f "$lock" ]; then
  echo "$lock is required for GDScript CI. Run mise run godot:lock and commit it." >&2
  exit 1
fi

tmp_dir="$(mktemp -d)"
trap 'rm -rf "$tmp_dir"' EXIT
candidate="$tmp_dir/pylock.gdtoolkit.toml"
cp "$lock" "$candidate"
uv pip compile \
  --quiet \
  --python-version 3.12 \
  --universal \
  --format pylock.toml \
  --custom-compile-command "mise run godot:lock" \
  --output-file "$candidate" \
  .config/python/gdtoolkit-requirements.in
if ! cmp -s "$lock" "$candidate"; then
  echo "$lock is stale. Run mise run godot:lock and commit the result." >&2
  exit 1
fi
'''

[tasks."godot:gdtoolkit:install"]
description = "Install pinned GDToolkit into its tool-owned environment"
sources = [
  ".config/mise/conf.d/20-godot.toml",
  ".config/python/gdtoolkit-requirements.in",
  ".config/python/pylock.gdtoolkit.toml",
]
outputs = [".cache/gdtoolkit/.installed"]
run = """
set -eu
uv venv --clear --python python .cache/gdtoolkit
uv --preview-features pylock pip sync \
  --python .cache/gdtoolkit \
  .config/python/pylock.gdtoolkit.toml
touch .cache/gdtoolkit/.installed
"""

[tasks."godot:install"]
description = "Install pinned GDScript tooling"
depends = ["godot:gdtoolkit:install"]

[tasks."godot:fmt"]
description = "Format GDScript source"
depends = ["godot:gdtoolkit:install"]
run = "uv run --no-project --python .cache/gdtoolkit gdformat src tests"

[tasks."godot:fmt:check"]
description = "Check GDScript formatting"
depends = ["godot:gdtoolkit:install"]
run = "uv run --no-project --python .cache/gdtoolkit gdformat --check src tests"

[tasks."godot:gdlint"]
description = "Run GDScript style and complexity checks"
hide = true
depends = ["godot:gdtoolkit:install"]
run = "uv run --no-project --python .cache/gdtoolkit gdlint src tests"

[tasks."godot:import"]
description = "Import Godot project resources headlessly"
run = "godot --headless --path . --import"

[tasks."godot:check"]
description = "Import the project and parse/type-check every owned GDScript file"
run = '''
set -eu
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT

run_godot_checked() {
  set +e
  godot "$@" >"$tmp" 2>&1
  status="$?"
  set -e
  cat "$tmp"
  if [ "$status" -ne 0 ]; then
    return "$status"
  fi
  if grep -E 'SCRIPT ERROR|Parse Error|ERROR:' "$tmp" >/dev/null; then
    return 1
  fi
}

check_metadata=0
metadata_before=
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  check_metadata=1
  metadata_before="$(git status --porcelain -- '*.uid' '*.import')"
fi
run_godot_checked --headless --path . --import
if [ "$check_metadata" -eq 1 ]; then
  metadata_after="$(git status --porcelain -- '*.uid' '*.import')"
  if [ "$metadata_before" != "$metadata_after" ]; then
    echo "Godot import metadata changed; commit the generated files:" >&2
    printf '%s\n' "$metadata_after" >&2
    exit 1
  fi
fi

find src tests -type f -name '*.gd' -print | LC_ALL=C sort | while IFS= read -r script; do
  run_godot_checked --headless --path . --check-only --script "$script"
done
run_godot_checked --headless --path . --script res://tests/gdscript_load_check.gd
'''

[tasks."godot:lint"]
description = "Lint and type-check GDScript"
run = [{ task = "godot:gdlint" }, { task = "godot:check" }]

[tasks."godot:test"]
description = "Run headless GDScript tests"
run = '''
set -eu
if [ ! -f tests/run_tests.gd ]; then
  echo "tests/run_tests.gd is required; add a native runner or replace godot:test." >&2
  exit 1
fi

tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT

run_godot_checked() {
  set +e
  godot "$@" >"$tmp" 2>&1
  status="$?"
  set -e
  cat "$tmp"
  if [ "$status" -ne 0 ]; then
    return "$status"
  fi
  if grep -E 'SCRIPT ERROR|Parse Error|ERROR:' "$tmp" >/dev/null; then
    return 1
  fi
}

run_godot_checked --headless --path . --import
run_godot_checked --headless --path . --script res://tests/run_tests.gd
'''

[tasks."godot:standards"]
description = "Run the GDScript standards workflow with autofixes"
depends = ["godot:fmt"]

[tasks."godot:standards:check"]
description = "Run the GDScript standards CI gate"
run = [
  { task = "godot:lock:check" },
  { task = "godot:fmt:check" },
  { task = "godot:lint" },
  { task = "godot:test" },
]
