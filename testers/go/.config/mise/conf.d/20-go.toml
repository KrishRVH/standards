[env]
GOTOOLCHAIN = "local"

[tools]
go = "1.26.4"
gofumpt = "0.10.0"
golangci-lint = "2.12.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.4.0"

[tasks."go:install"]
description = "Download Go module dependencies"
run = "go mod download"

[tasks."go:fmt:check"]
description = "Check Go formatting"
run = """
files="$(gofumpt -l .)"
if [ -n "$files" ]; then
  printf '%s\n' "$files"
  exit 1
fi
"""

[tasks."go:lint"]
description = "Run Go static analysis"
depends = ["go:install"]
run = """
go mod tidy -diff
go mod verify
go vet ./...
golangci-lint run ./...
govulncheck -test ./...
"""

[tasks."go:test"]
description = "Run Go tests"
depends = ["go:install"]
run = "go test -trimpath -count=1 ./..."

[tasks."go:check"]
description = "Run Go formatting, static analysis, and tests"
depends = ["go:fmt:check", "go:lint", "go:test"]

[tasks."go:ci"]
description = "Run the Go CI gate"
depends = ["go:check"]
