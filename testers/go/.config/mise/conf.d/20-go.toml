[env]
GOTOOLCHAIN = "local"

[tools]
go = "1.26.5"
gofumpt = "0.10.0"
golangci-lint = "2.12.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.4.0"

[tasks."go:install"]
description = "Download Go module dependencies"
run = "go mod download"

[tasks."go:fmt"]
description = "Format Go source"
run = """
set -eu
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard -z -- '*.go' > "$tmp"
else
  find . -type d \\( -name .git -o -name vendor -o -name .gstack \\) -prune \
    -o -type f -name '*.go' -print0 > "$tmp"
fi
if [ -s "$tmp" ]; then
  xargs -0 gofumpt -w < "$tmp"
fi
"""

[tasks."go:fmt:check"]
description = "Check Go formatting"
run = """
set -eu
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard -z -- '*.go' > "$tmp"
else
  find . -type d \\( -name .git -o -name vendor -o -name .gstack \\) -prune \
    -o -type f -name '*.go' -print0 > "$tmp"
fi
if [ ! -s "$tmp" ]; then
  exit 0
fi
files="$(xargs -0 gofumpt -l < "$tmp")"
if [ -n "$files" ]; then
  printf '%s\n' "$files"
  exit 1
fi
"""

[tasks."go:mod:tidy"]
description = "Tidy Go module files"
run = "go mod tidy"

[tasks."go:mod:check"]
description = "Check Go module tidiness"
depends = ["go:install"]
run = "go mod tidy -diff"

[tasks."go:mod:verify"]
description = "Verify downloaded Go modules"
depends = ["go:install"]
run = "go mod verify"

[tasks."go:boringlint:build"]
description = "Build the restricted-dialect vet tool"
sources = [
  ".config/mise/conf.d/20-go.toml",
  "boringlint/**/*.go",
  "boringlint/go.mod",
  "boringlint/go.sum",
]
outputs = [".cache/boringlint"]
run = ["mkdir -p .cache", "go -C boringlint build -trimpath -o ../.cache/boringlint ./cmd/boringlint"]

[tasks."go:boringlint:check"]
description = "Check the restricted-dialect analyzer module"
run = [
  "go -C boringlint mod download",
  "go -C boringlint mod tidy -diff",
  "go -C boringlint mod verify",
  "go -C boringlint vet ./...",
  "(cd boringlint && golangci-lint run --config ../.golangci.yml ./...)",
  "go -C boringlint test -trimpath -count=1 ./...",
]

[tasks."go:lint"]
description = "Run Go static analysis and dependency checks"
depends = ["go:boringlint:build", "go:mod:check", "go:mod:verify"]
run = [
  "go vet ./...",
  'go vet -vettool="$PWD/.cache/boringlint" ./...',
  "golangci-lint run ./...",
  "govulncheck -test ./...",
]

[tasks."go:test"]
description = "Run Go tests"
depends = ["go:install"]
run = "go test -trimpath -count=1 ./..."

[tasks."go:test:race"]
description = "Run Go tests with the race detector"
depends = ["go:install"]
wait_for = ["go:test"]
run = "go test -trimpath -race -count=1 ./..."

[tasks."go:cover"]
description = "Run Go tests with coverage"
depends = ["go:install"]
wait_for = ["go:test:race"]
run = """
set -eu
mkdir -p coverage
go test -trimpath -count=1 -coverpkg=./... -covermode=atomic -coverprofile=coverage/go.out ./...
go tool cover -func=coverage/go.out
min="${GO_COVER_MIN:-}"
if [ -n "$min" ]; then
  actual="$(go tool cover -func=coverage/go.out | awk '/^total:/ { sub(/%/, "", $3); print $3 }')"
  awk -v actual="$actual" -v min="$min" 'BEGIN { exit(actual + 0 >= min + 0 ? 0 : 1) }' || {
    echo "coverage ${actual}% is below required ${min}%"
    exit 1
  }
fi
"""

[tasks."go:bench"]
description = "Run Go benchmarks"
depends = ["go:install"]
run = "go test -trimpath -run=^$ -bench=. -benchmem ./..."

[tasks."go:standards"]
description = "Run the Go standards workflow with autofixes"
run = [
  { task = "go:fmt" },
  { task = "go:mod:tidy" },
]

[tasks."go:standards:check"]
description = "Run the Go standards CI gate"
depends = ["go:boringlint:check", "go:fmt:check", "go:lint", "go:test", "go:test:race", "go:cover"]
