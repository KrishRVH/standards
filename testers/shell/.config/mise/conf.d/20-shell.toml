[tools]
bats = "1.13.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"

[tasks."shell:run"]
description = "Run a shell standards subcommand: fmt, fmt-check, lint, syntax, policy, or test"
usage = "arg \"command\""
run = """
bash <<'BASH'
set -Eeuo pipefail
IFS=$'\\n\\t'

command="${usage_command:?usage: mise run shell:run -- <fmt|fmt-check|lint|syntax|policy|test>}"
shfmt_flags=(-i 2 -ci -sr)

project_files() {
  if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    git ls-files -co --exclude-standard
  else
    find . \\
      \\( -path './.git' -o -path './node_modules' -o -path './vendor' \\
      -o -path './build' -o -path './dist' -o -path './out' -o -path './coverage' \\
      -o -path './.cache' -o -path './.next' -o -path './.nuxt' -o -path './.turbo' \\
      -o -path './.vite' -o -path './.svelte-kit' -o -path './target' \\
      -o -path './bin/Debug' -o -path './bin/Release' -o -path './obj' \\
      -o -path './.gradle' -o -path './.kotlin' -o -path './_build' -o -path './deps' \\
      -o -path './dist-newstyle' -o -path './.stack-work' -o -path './.zig-cache' \\
      -o -path './zig-cache' -o -path './zig-out' -o -path './zig-pkg' \\
      -o -path './.phpunit.cache' -o -path './.phpstan.cache' -o -path './.rector-cache' \\
      -o -path './.lua-language-server' -o -path './.elixir_ls' \\) -prune \\
      -o -type f -print | sed 's#^./##'
  fi
}

first_line() {
  local line
  IFS= read -r line <"$1" || line=""
  printf '%s' "${line}"
}

has_recognized_shell_shebang() {
  local line
  line="$(first_line "$1")"
  case "${line}" in
    '#!'*bash* | '#!'*bats* | '#!'*zsh* | '#!'*'/sh' | '#!'*'/sh '* | '#!'*'env sh'* | '#!'*'env -S sh'*)
      return 0
      ;;
    *)
      return 1
      ;;
  esac
}

is_shell_file() {
  case "$1" in
    *.sh | *.bash | *.bats | *.zsh)
      return 0
      ;;
  esac

  has_recognized_shell_shebang "$1"
}

shell_files() {
  local file
  while IFS= read -r file; do
    [ -f "${file}" ] || continue
    if is_shell_file "${file}"; then
      printf '%s\\n' "${file}"
    fi
  done < <(project_files)
}

dialect_for() {
  local line
  line="$(first_line "$1")"
  case "${line}" in
    '#!'*bats*)
      printf 'bats'
      return
      ;;
    '#!'*zsh*)
      printf 'zsh'
      return
      ;;
    '#!'*bash*)
      printf 'bash'
      return
      ;;
    '#!'*'/sh' | '#!'*'/sh '* | '#!'*'env sh'* | '#!'*'env -S sh'*)
      printf 'posix'
      return
      ;;
  esac

  case "$1" in
    *.bats)
      printf 'bats'
      ;;
    *.zsh)
      printf 'zsh'
      ;;
    *)
      printf 'bash'
      ;;
  esac
}

shellcheck_shell_for() {
  case "$1" in
    posix)
      printf 'sh'
      ;;
    *)
      printf '%s' "$1"
      ;;
  esac
}

is_glue_script() {
  case "$1" in
    scripts/* | bin/* | ci/* | tools/* | dev/*)
      return 0
      ;;
    *)
      return 1
      ;;
  esac
}

has_strict_mode() {
  sed -n '1,20p' "$1" | grep -Fxq 'set -Eeuo pipefail'
}

has_strict_ifs() {
  sed -n '1,20p' "$1" | grep -Fxq "IFS=\\$'\\\\n\\\\t'"
}

run_shfmt() {
  local mode="$1"
  local status=0
  local count=0
  local file dialect

  while IFS= read -r file; do
    dialect="$(dialect_for "${file}")"
    count=$((count + 1))

    if [ "${mode}" = "write" ]; then
      shfmt -w "${shfmt_flags[@]}" -ln "${dialect}" "${file}" || status=1
    else
      shfmt -d "${shfmt_flags[@]}" -ln "${dialect}" "${file}" || status=1
    fi
  done < <(shell_files)

  if [ "${count}" -eq 0 ]; then
    echo "No shell files found."
  fi

  return "${status}"
}

run_shellcheck() {
  local status=0
  local count=0
  local file dialect shell

  while IFS= read -r file; do
    dialect="$(dialect_for "${file}")"
    if [ "${dialect}" = "zsh" ]; then
      continue
    fi

    shell="$(shellcheck_shell_for "${dialect}")"
    count=$((count + 1))
    shellcheck -s "${shell}" "${file}" || status=1
  done < <(shell_files)

  if [ "${count}" -eq 0 ]; then
    echo "No ShellCheck-compatible shell files found."
  fi

  return "${status}"
}

run_syntax() {
  local status=0
  local count=0
  local file dialect

  while IFS= read -r file; do
    dialect="$(dialect_for "${file}")"
    case "${dialect}" in
      bash)
        count=$((count + 1))
        bash -n "${file}" || status=1
        ;;
      posix)
        count=$((count + 1))
        sh -n "${file}" || status=1
        ;;
      zsh)
        count=$((count + 1))
        if ! command -v zsh >/dev/null 2>&1; then
          echo "${file}: zsh is required to syntax-check zsh scripts." >&2
          status=1
        else
          zsh -n "${file}" || status=1
        fi
        ;;
    esac
  done < <(shell_files)

  if [ "${count}" -eq 0 ]; then
    echo "No standalone shell scripts found for syntax checks."
  fi

  return "${status}"
}

run_policy() {
  local status=0
  local file dialect

  while IFS= read -r file; do
    is_glue_script "${file}" || continue
    dialect="$(dialect_for "${file}")"

    if ! has_recognized_shell_shebang "${file}"; then
      echo "${file}: project glue scripts need a recognized shell shebang." >&2
      status=1
    fi

    if [ "${dialect}" = "bash" ]; then
      if ! has_strict_mode "${file}"; then
        echo "${file}: Bash glue scripts need 'set -Eeuo pipefail' in the first 20 lines." >&2
        status=1
      fi
      if ! has_strict_ifs "${file}"; then
        echo "${file}: Bash glue scripts need \"IFS=\\$'\\\\n\\\\t'\" in the first 20 lines." >&2
        status=1
      fi
    fi
  done < <(shell_files)

  return "${status}"
}

run_tests() {
  local files=()
  local count=0
  local file

  while IFS= read -r file; do
    case "${file}" in
      *.bats)
        files+=("${file}")
        count=$((count + 1))
        ;;
    esac
  done < <(shell_files)

  if [ "${count}" -eq 0 ]; then
    echo "No Bats tests found."
    return 0
  fi

  bats "${files[@]}"
}

case "${command}" in
  fmt)
    run_shfmt write
    ;;
  fmt-check)
    run_shfmt check
    ;;
  lint)
    status=0
    run_shellcheck || status=1
    run_syntax || status=1
    run_policy || status=1
    exit "${status}"
    ;;
  syntax)
    run_syntax
    ;;
  policy)
    run_policy
    ;;
  test)
    run_tests
    ;;
  *)
    echo "Unknown shell standards subcommand: ${command}" >&2
    exit 2
    ;;
esac
BASH
"""

[tasks."shell:fmt"]
description = "Format shell scripts"
run = "mise run shell:run -- fmt"

[tasks."shell:fmt:check"]
description = "Check shell script formatting"
run = "mise run shell:run -- fmt-check"

[tasks."shell:lint"]
description = "Run shell static analysis, syntax checks, and glue-script policy"
run = "mise run shell:run -- lint"

[tasks."shell:syntax"]
description = "Run shell parser checks"
run = "mise run shell:run -- syntax"

[tasks."shell:policy"]
description = "Check shell glue-script shebang and strict-mode policy"
run = "mise run shell:run -- policy"

[tasks."shell:test"]
description = "Run Bats shell tests"
run = "mise run shell:run -- test"

[tasks."shell:standards"]
description = "Run the shell standards workflow with autofixes"
run = "mise run shell:fmt"

[tasks."shell:standards:check"]
description = "Run the shell standards CI gate"
run = """
mise run shell:fmt:check
mise run shell:lint
mise run shell:test
"""
