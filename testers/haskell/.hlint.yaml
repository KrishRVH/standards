- arguments:
  - -XGHC2024

- group:
    name: future
    enabled: true

- modules:
  - name: Debug.Trace
    within: []
  - name: System.IO.Unsafe
    within: []
  - name: Unsafe.Coerce
    within: []

- functions:
  - name: error
    within: []
  - name: undefined
    within: []
  - name: read
    within: []
  - name: head
    within: []
  - name: tail
    within: []
  - name: init
    within: []
  - name: last
    within: []
  - name: fromJust
    within: []
