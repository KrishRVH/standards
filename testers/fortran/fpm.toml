name = "project_name"
version = "0.1.0"
license = "MIT OR Apache-2.0"
author = ["Project Maintainers"]
maintainer = ["maintainers@example.com"]
copyright = "Copyright 2026 Project Maintainers"
description = "A strict modern Fortran project."
categories = ["library"]
keywords = ["fortran"]

[build]
auto-executables = false
auto-examples = false
auto-tests = false

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

[library]
source-dir = "src"

[[executable]]
name = "project-name"
source-dir = "app"
main = "main.f90"

[[test]]
name = "project-tests"
source-dir = "test"
main = "main.f90"

[install]
library = true

[dev-dependencies]
test-drive.git = "https://github.com/fortran-lang/test-drive"
test-drive.tag = "v0.6.1"

[extra.ford]
project = "project_name"
summary = "Strict modern Fortran project template."
author = "Project Maintainers"
src_dir = ["src"]
output_dir = "build/doc"
display = ["public", "protected"]
preprocess = false
source = true
search = true
graph = false
