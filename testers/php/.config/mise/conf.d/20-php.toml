[tools]
php = "8.5.7"

[env]
PHP_CONFIGURE_OPTIONS = "--with-openssl --with-readline --with-gettext --with-sodium"

[tasks."php:install"]
description = "Install PHP dependencies"
run = """
if ! php -m | grep -qi '^sodium$'; then
  echo "PHP extension ext-sodium is required by the locked PHP quality tooling." >&2
  echo "Rebuild or install the pinned PHP runtime with sodium enabled before running PHP tasks." >&2
  exit 1
fi

composer install --no-interaction
"""

[tasks."php:fmt"]
description = "Auto-fix PHP style issues"
depends = ["php:install"]
run = "composer phpcbf"

[tasks."php:fmt:check"]
description = "Check PHP formatting/style"
depends = ["php:install"]
run = "composer phpcs"

[tasks."php:lint"]
description = "Run PHP lint/static-analysis checks"
depends = ["php:install"]
run = "composer lint"

[tasks."php:test"]
description = "Run PHP tests"
depends = ["php:install"]
run = "composer test"

[tasks."php:check"]
description = "Run the PHP project check script"
depends = ["php:install"]
run = "composer check"
