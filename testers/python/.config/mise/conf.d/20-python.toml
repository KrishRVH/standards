[tools]
python = "3.14.6"
uv = "0.11.22"

[tasks."py:install"]
description = "Install Python dependencies"
run = """
if [ ! -f pyproject.toml ]; then
  echo "No pyproject.toml found."
  exit 0
fi

if [ -f uv.lock ]; then
  uv sync --all-groups --locked
else
  uv sync --all-groups
fi
"""

[tasks."py:fmt"]
description = "Format Python source and tests"
depends = ["py:install"]
run = "uv run ruff format ."

[tasks."py:fmt:check"]
description = "Check Python formatting"
depends = ["py:install"]
run = "uv run ruff format --check ."

[tasks."py:ruff"]
description = "Run Ruff lint rules"
depends = ["py:install"]
run = "uv run ruff check ."

[tasks."py:type"]
description = "Run strict Python type analysis"
depends = ["py:install"]
run = """
uv run basedpyright --warnings
uv run mypy
"""

[tasks."py:deps"]
description = "Check Python dependency hygiene"
depends = ["py:install"]
run = "uv run deptry ."

[tasks."py:docs"]
description = "Check Python docstring coverage"
depends = ["py:install"]
run = "uv run interrogate ."

[tasks."py:complexity"]
description = "Check Python complexity budgets"
depends = ["py:install"]
run = """
paths=""
[ -d src ] && paths="$paths src"
[ -d tests ] && paths="$paths tests"

if [ -z "$paths" ]; then
  echo "No src or tests directories found; skipping xenon."
else
  uv run xenon --max-absolute B --max-modules A --max-average A $paths
fi
"""

[tasks."py:slots"]
description = "Check dataclass slot coverage"
depends = ["py:install"]
run = """
if [ ! -d src ]; then
  echo "No src directory found; skipping slotscheck."
  exit 0
fi

uv run slotscheck src
"""

[tasks."py:security"]
description = "Run Python security analysis"
depends = ["py:install"]
run = """
if [ -d src ]; then
  uv run bandit -c pyproject.toml -r src
else
  echo "No src directory found; skipping bandit."
fi
"""

[tasks."py:deadcode"]
description = "Check for high-confidence dead Python code"
depends = ["py:install"]
run = "uv run vulture"

[tasks."py:lint"]
description = "Run all Python static analysis"
depends = ["py:install"]
run = """
mise run py:ruff
mise run py:type
mise run py:deps
mise run py:docs
mise run py:complexity
mise run py:slots
mise run py:security
mise run py:deadcode
"""

[tasks."py:test"]
description = "Run Python tests with branch coverage"
depends = ["py:install"]
run = "uv run pytest"

[tasks."py:build"]
description = "Build Python source and wheel distributions"
depends = ["py:install"]
run = "uv build"

[tasks."py:check"]
description = "Run Python formatting, static analysis, tests, and package builds"
run = """
mise run py:fmt:check
mise run py:lint
mise run py:test
mise run py:build
"""

[tasks."standards:check"]
description = "Run the Python standards reference gate locally"
depends = ["py:check"]

[tasks."py:ci"]
description = "Run the Python CI gate"
depends = ["py:check"]
