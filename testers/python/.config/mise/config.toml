"""

[tasks."check:local"]
description = "Run all checks directly on the current machine"
run = """
mise run fmt:check
mise run lint
mise run test
"""

[tasks.check]
description = "Run all checks through Dagger"
depends = ["dagger:check"]

[tasks.ci]
description = "Run the CI pipeline through Dagger"
depends = ["dagger:ci"]
