[tasks.test]
description = "Run tests using detected language tasks"
run = """
set -eu
ran=0

if [ -f composer.json ]; then
  mise run php:test
  ran=1
fi

if [ -f pyproject.toml ]; then
  mise run py:test
  ran=1
fi

if [ -f package.json ]; then
  mise run ts:test
  ran=1
fi

if [ -f Cargo.toml ]; then
