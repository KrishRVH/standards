config:
  validation: true
  warningsAsErrors: true

complexity:
  CyclomaticComplexMethod:
    active: true
    allowedComplexity: 10
  LongMethod:
    active: true
    allowedLines: 60
  LongParameterList:
    active: true
    allowedConstructorParameters: 8
    allowedFunctionParameters: 6
  NestedBlockDepth:
    active: true
    allowedDepth: 3
  TooManyFunctions:
    active: true
    allowedFunctionsPerClass: 12
    allowedFunctionsPerEnum: 12
    allowedFunctionsPerFile: 20
    allowedFunctionsPerInterface: 12
    allowedFunctionsPerObject: 12

exceptions:
  TooGenericExceptionCaught:
    active: true
  TooGenericExceptionThrown:
    active: true

naming:
  FunctionNaming:
    active: true
    functionPattern: "[a-z][a-zA-Z0-9]*"
  TopLevelPropertyNaming:
    active: true
    constantPattern: "[A-Z][_A-Z0-9]*"

performance:
  SpreadOperator:
    active: true

potential-bugs:
  UnsafeCallOnNullableType:
    active: true

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 100
  RedundantVisibilityModifier:
    active: false
  ReturnCount:
    active: true
    max: 3
  ThrowsCount:
    active: true
    max: 2
  WildcardImport:
    active: true
