[tools]
java = "26.0.1"
gradle = "9.5.0"
kotlin = "2.4.0"
ktlint = "1.8.0"

[tasks."kotlin:fmt:check"]
description = "Check Kotlin formatting"
run = "ktlint '**/*.kt' '**/*.kts' '!**/build/**' '!**/.gradle/**' '!**/.kotlin/**'"

[tasks."kotlin:lint"]
description = "Run Kotlin static analysis and main-source compilation"
run = "gradle --no-daemon --warning-mode=fail detekt classes"

[tasks."kotlin:test"]
description = "Run Kotlin/JVM tests"
run = "gradle --no-daemon --warning-mode=fail test"

[tasks."kotlin:check"]
description = "Run Kotlin formatting, static analysis, and tests"
run = """
mise run kotlin:fmt:check
mise run kotlin:lint
mise run kotlin:test
"""

[tasks."kotlin:ci"]
description = "Run the Kotlin CI gate"
depends = ["kotlin:check"]
