[settings]
experimental = true

[tools]
"pkgx:llvm.org" = "22.1.8"
clang-format = "22.1.8"
cmake = "4.3.4"
ninja = "1.13.2"

[tasks."cpp:fmt"]
description = "Format C++ sources"
run = """
if command -v clang-format >/dev/null 2>&1; then
  tmp="$(mktemp -d)"
  trap 'rm -rf "$tmp"' EXIT
  if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
    git ls-files --cached --others --exclude-standard -z -- \
      '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' '*.ipp' '*.tpp' '*.inl' '*.ixx' '*.cppm' '*.cxxm' \
      ':(exclude)build/**' ':(exclude)build-*/**' > "$tmp/files"
  else
    find . -type d \\( -name .git -o -name build -o -name 'build-*' \\) -prune \
      -o -type f \\( -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.h' -o -name '*.hh' -o -name '*.hpp' -o -name '*.hxx' -o -name '*.ipp' -o -name '*.tpp' -o -name '*.inl' -o -name '*.ixx' -o -name '*.cppm' -o -name '*.cxxm' \\) -print0 > "$tmp/files"
  fi
  if [ -s "$tmp/files" ]; then
    xargs -0 clang-format -i < "$tmp/files"
  fi
else
  echo "clang-format is required for C++ formatting." >&2
  exit 1
fi
"""

[tasks."cpp:fmt:check"]
description = "Check C++ source formatting"
run = """
tmp="$(mktemp -d)"
trap 'rm -rf "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard -z -- \
    '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' '*.ipp' '*.tpp' '*.inl' '*.ixx' '*.cppm' '*.cxxm' \
    ':(exclude)build/**' ':(exclude)build-*/**' > "$tmp/files"
else
  find . -type d \\( -name .git -o -name build -o -name 'build-*' \\) -prune \
    -o -type f \\( -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.h' -o -name '*.hh' -o -name '*.hpp' -o -name '*.hxx' -o -name '*.ipp' -o -name '*.tpp' -o -name '*.inl' -o -name '*.ixx' -o -name '*.cppm' -o -name '*.cxxm' \\) -print0 > "$tmp/files"
fi
if [ ! -s "$tmp/files" ]; then
  exit 0
fi
xargs -0 -n 1 sh -c '
  for file do
    clang-format "$file" | cmp -s "$file" - || {
      echo "Needs formatting: $file" >&2
      exit 1
    }
  done
' sh < "$tmp/files"
"""

[tasks."cpp:lint"]
description = "Run C++ static checks"
run = """
cmake --preset clang
cmake --build --preset clang
./cpp-quality.sh . build/clang
"""

[tasks."cpp:test"]
description = "Run pinned C++ Debug and Release tests"
run = "./cpp-build.sh"

[tasks."cpp:portability"]
description = "Run C++ checks with available alternate and cross compilers"
run = "./cpp-build.sh portability"

[tasks."cpp:standards"]
description = "Run the C++ standards workflow with autofixes"
run = "mise run cpp:fmt"

[tasks."cpp:standards:check"]
description = "Run the C++ standards CI gate"
run = """
mise run cpp:fmt:check
mise run cpp:lint
mise run cpp:test
"""
