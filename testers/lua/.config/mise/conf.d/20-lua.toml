[tools]
lua = "5.4.8"
lua-language-server = "3.18.2"
stylua = "2.5.2"

[tasks."lua:install"]
description = "Install Lua project lint/test tooling"
run = """
if ! command -v luarocks >/dev/null 2>&1; then
  echo "luarocks is required for Lua lint/test tooling." >&2
  exit 1
fi

if ! luarocks --tree .lua_modules list luacheck | grep -q '1.2.0-1'; then
  luarocks --tree .lua_modules install luacheck 1.2.0-1
fi

if [ -f busted.lua ] || [ -d spec ] || [ -d specs ] || [ -d test ] || [ -d tests ]; then
  if ! luarocks --tree .lua_modules list busted | grep -q '2.3.0-1'; then
    luarocks --tree .lua_modules install busted 2.3.0-1
  fi
fi
"""

[tasks."lua:fmt"]
description = "Format Lua code"
run = "stylua ."

[tasks."lua:fmt:check"]
description = "Check Lua formatting"
run = "stylua --check ."

[tasks."lua:lint"]
description = "Run Luacheck and LuaLS diagnostics"
depends = ["lua:install"]
run = """
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT

eval "$(luarocks --tree .lua_modules path)"
luacheck --exclude-files '.lua_modules/**' --exclude-files '.lua-language-server/**' -- .

if ! lua-language-server --check=. --check_format=json --check_out_path="$tmp" --checklevel=Warning --logpath=.lua-language-server/log; then
  cat "$tmp"
  exit 1
fi

cat "$tmp"
if [ "$(tr -d '[:space:]' < "$tmp")" != "[]" ]; then
  exit 1
fi
"""

[tasks."lua:test"]
description = "Run Lua tests when a test runner is configured"
depends = ["lua:install"]
run = """
if [ -f busted.lua ] || [ -d spec ] || [ -d specs ] || [ -d test ] || [ -d tests ]; then
  eval "$(luarocks --tree .lua_modules path)"
  export LUA_PATH="src/?.lua;src/?/init.lua;${LUA_PATH:-}"
  paths=""
  [ -d spec ] && paths="$paths spec"
  [ -d specs ] && paths="$paths specs"
  [ -d test ] && paths="$paths test"
  [ -d tests ] && paths="$paths tests"
  if [ -n "$paths" ]; then
    busted $paths
  else
    busted
  fi
else
  echo "No Lua test runner detected."
fi
"""

[tasks."lua:standards"]
description = "Run the Lua standards workflow with autofixes"
depends = ["lua:fmt"]

[tasks."lua:standards:check"]
description = "Run the Lua standards CI gate"
depends = ["lua:fmt:check", "lua:lint", "lua:test"]
