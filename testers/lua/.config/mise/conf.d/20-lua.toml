[tools]
lua = "5.4.8"
lua-language-server = "3.18.2"
stylua = "2.5.2"

[tasks."lua:install"]
description = "Install Lua project lint/test tooling"
run = """
if ! command -v luarocks >/dev/null 2>&1; then
  echo "luarocks is required for Lua lint/test tooling." >&2
  exit 1
fi

luarocks --tree .lua_modules install luacheck 1.2.0-1

if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  luarocks --tree .lua_modules install busted 2.3.0-1
fi
"""

[tasks."lua:fmt"]
description = "Format Lua code"
run = "stylua ."

[tasks."lua:fmt:check"]
description = "Check Lua formatting"
run = "stylua --check ."

[tasks."lua:lint"]
description = "Run Luacheck and LuaLS diagnostics"
depends = ["lua:install"]
run = """
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT

eval "$(luarocks --tree .lua_modules path)"
luacheck --exclude-files '.lua_modules/**' --exclude-files '.lua-language-server/**' -- .

if ! lua-language-server --check=. --check_format=pretty --checklevel=Warning --logpath=.lua-language-server/log >"$tmp" 2>&1; then
  cat "$tmp"
  exit 1
fi

cat "$tmp"
if ! grep -Eq "Diagnosis complete(d)?, (0|no) problems found" "$tmp"; then
  exit 1
fi
"""

[tasks."lua:test"]
description = "Run Lua tests when a test runner is configured"
depends = ["lua:install"]
run = """
if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  eval "$(luarocks --tree .lua_modules path)"
  busted
else
  echo "No Lua test runner detected."
fi
"""

[tasks."lua:check"]
description = "Run Lua formatting, linting, and tests"
run = """
mise run lua:fmt:check
mise run lua:lint
mise run lua:test
"""
