# Replace collectors and rules with the project's real architectural boundaries.
deptrac:
  paths:
    - ./src

  layers:
    - name: PublicApi
      collectors:
        - type: classLike
          value: ^App\\(Contract|PublicApi)\\

    - name: Internal
      collectors:
        - type: classLike
          value: ^App\\Internal\\

  ruleset:
    PublicApi: []
    Internal:
      - PublicApi
