[tools]
bun = "1.3.14"

[tasks."ts:install"]
description = "Install Bun-managed TypeScript/JavaScript dependencies"
run = """
if [ -f bun.lock ]; then
  bun install --frozen-lockfile
else
  bun install
fi
"""

[tasks."ts:run"]
description = "Run a Bun package script: mise run ts:run -- <script>"
usage = "arg \"script\""
run = "bun run \"$usage_script\""

[tasks."ts:fmt"]
description = "Format TypeScript/JavaScript"
depends = ["ts:install"]
run = "mise run ts:run -- format:fix"

[tasks."ts:fmt:check"]
description = "Check TypeScript/JavaScript formatting"
depends = ["ts:install"]
run = "mise run ts:run -- format:check"

[tasks."ts:lint"]
description = "Lint TypeScript/JavaScript"
depends = ["ts:install"]
run = "mise run ts:run -- lint:check"

[tasks."ts:type"]
description = "Run TypeScript type checks"
depends = ["ts:install"]
run = "mise run ts:run -- typecheck"

[tasks."ts:test"]
description = "Run TypeScript/JavaScript tests"
depends = ["ts:install"]
run = "mise run ts:run -- test"

[tasks."ts:check"]
description = "Run TypeScript/JavaScript formatting, linting, type checks, and tests"
depends = ["ts:install"]
run = "mise run ts:run -- ci"

[tasks."ts:ci"]
description = "Run the TypeScript/JavaScript CI gate"
depends = ["ts:check"]
