[tools]
bun = "1.3.14"

[tasks."ts:install"]
description = "Install Bun-managed TypeScript/JavaScript dependencies"
wait_for = ["ts:lock:check"]
run = """
if [ -f bun.lock ]; then
  bun install --frozen-lockfile
else
  bun install
fi
"""

[tasks."ts:lock"]
description = "Refresh the Bun lockfile"
run = "bun install"

[tasks."ts:lock:check"]
description = "Ensure the Bun lockfile is present"
run = """
if [ ! -f bun.lock ]; then
  echo "bun.lock is required for TypeScript/JavaScript CI. Run mise run ts:lock and commit the generated lockfile." >&2
  exit 1
fi
"""

[tasks."ts:run"]
description = "Run a Bun package script: mise run ts:run -- <script>"
usage = "arg \"script\""
run = "bun run \"$usage_script\""

[tasks."ts:fmt"]
description = "Format TypeScript/JavaScript"
depends = ["ts:install"]
run = "bun run format"

[tasks."ts:fmt:check"]
description = "Check TypeScript/JavaScript formatting"
depends = ["ts:install"]
run = "bun run format:check"

[tasks."ts:lint"]
description = "Lint TypeScript/JavaScript"
depends = ["ts:install"]
run = "bun run lint"

[tasks."ts:type"]
description = "Run TypeScript type checks"
depends = ["ts:install"]
run = "bun run typecheck"

[tasks."ts:test"]
description = "Run TypeScript/JavaScript tests"
depends = ["ts:install"]
run = "bun run test"

[tasks."ts:audit"]
description = "Audit TypeScript/JavaScript dependencies"
depends = ["ts:install"]
run = "bun run audit"

[tasks."ts:standards"]
description = "Run the TypeScript/JavaScript standards workflow with autofixes"
depends = ["ts:install"]
run = "bun run standards"

[tasks."ts:standards:check"]
description = "Run the TypeScript/JavaScript standards CI gate"
depends = ["ts:lock:check", "ts:install"]
run = "bun run standards:check"
