[tools]
erlang = "29.0.2"
elixir = "1.20.1-otp-29"
rebar = "3.27.0"

[tasks."elixir:install"]
description = "Install Elixir project dependencies"
run = [
  "mix local.hex 2.4.2 --force",
  '''mix local.rebar rebar3 "$(command -v rebar3)" --force''',
  """
  if [ -f mix.lock ]; then
    mix deps.get --check-locked
  else
    mix deps.get
  fi
  """,
]

[tasks."elixir:fmt"]
description = "Format Elixir source"
depends = ["elixir:install"]
run = "mix format"

[tasks."elixir:fmt:check"]
description = "Check Elixir formatting"
depends = ["elixir:install"]
run = "mix format --check-formatted"

[tasks."elixir:lint"]
description = "Run Elixir static analysis"
depends = ["elixir:install"]
wait_for = ["elixir:fmt:check"]
run = [
  "MIX_ENV=test mix compile --warnings-as-errors",
  "mix credo --strict",
  "mix xref graph --format cycles --label compile-connected --fail-above 0",
]

[tasks."elixir:test"]
description = "Run Elixir tests"
depends = ["elixir:install"]
wait_for = ["elixir:lint"]
run = "MIX_ENV=test mix test --warnings-as-errors"

[tasks."elixir:types"]
description = "Run Elixir Dialyzer type analysis"
depends = ["elixir:install"]
wait_for = ["elixir:test"]
run = "mix dialyzer"

[tasks."elixir:deps"]
description = "Audit Elixir dependency hygiene"
depends = ["elixir:install"]
wait_for = ["elixir:types"]
run = ["mix deps.unlock --check-unused", "mix hex.audit", "mix deps.audit"]

[tasks."elixir:docs"]
description = "Build Elixir docs with warnings denied"
depends = ["elixir:install"]
wait_for = ["elixir:deps"]
run = "MIX_ENV=dev mix docs --warnings-as-errors"

[tasks."elixir:coverage"]
description = "Run Elixir coverage report"
depends = ["elixir:install"]
wait_for = ["elixir:docs"]
run = "MIX_ENV=test mix coveralls"

[tasks."elixir:standards"]
description = "Run the Elixir standards workflow with autofixes"
depends = ["elixir:fmt"]

[tasks."elixir:standards:check"]
description = "Run the Elixir standards CI gate"
depends = [
  "elixir:fmt:check",
  "elixir:lint",
  "elixir:test",
  "elixir:types",
  "elixir:deps",
  "elixir:docs",
  "elixir:coverage",
]
