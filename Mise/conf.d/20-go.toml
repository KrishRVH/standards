[env]
GOTOOLCHAIN = "local"

[tools]
go = "1.26.4"
gofumpt = "0.10.0"
golangci-lint = "2.12.2"
"go:golang.org/x/vuln/cmd/govulncheck" = "1.4.0"

[tasks."go:install"]
description = "Download Go module dependencies"
run = "go mod download"

[tasks."go:fmt"]
description = "Format Go source"
run = "gofumpt -w ."

[tasks."go:fmt:check"]
description = "Check Go formatting"
run = """
files="$(gofumpt -l .)"
if [ -n "$files" ]; then
  printf '%s\n' "$files"
  exit 1
fi
"""

[tasks."go:mod:tidy"]
description = "Tidy Go module files"
run = "go mod tidy"

[tasks."go:mod:check"]
description = "Check Go module tidiness"
run = "go mod tidy -diff"

[tasks."go:mod:verify"]
description = "Verify downloaded Go modules"
run = "go mod verify"

[tasks."go:lint"]
description = "Run Go static analysis and dependency checks"
depends = ["go:install"]
run = """
mise run go:mod:check
mise run go:mod:verify
go vet ./...
golangci-lint run ./...
govulncheck ./...
"""

[tasks."go:test"]
description = "Run Go tests"
depends = ["go:install"]
run = "go test -trimpath -count=1 ./..."

[tasks."go:test:race"]
description = "Run Go tests with the race detector"
depends = ["go:install"]
run = "go test -trimpath -race -count=1 ./..."

[tasks."go:cover"]
description = "Run Go tests with coverage"
depends = ["go:install"]
run = "mkdir -p coverage && go test -trimpath -count=1 -covermode=atomic -coverprofile=coverage/go.out ./... && go tool cover -func=coverage/go.out"

[tasks."go:bench"]
description = "Run Go benchmarks"
depends = ["go:install"]
run = "go test -trimpath -run=^$ -bench=. -benchmem ./..."

[tasks."go:check"]
description = "Run Go formatting, static analysis, and tests"
depends = ["go:fmt:check", "go:lint", "go:test"]
