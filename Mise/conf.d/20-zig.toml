[tools]
zig = "0.16.0"

[tasks."zig:fmt"]
description = "Format Zig source"
run = """
set -eu
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard -z -- '*.zig' '*.zon' > "$tmp"
else
  find . -type d \\( -name .git -o -name .zig-cache -o -name zig-cache -o -name zig-out -o -name zig-pkg \\) -prune \
    -o -type f \\( -name '*.zig' -o -name '*.zon' \\) -print0 > "$tmp"
fi
if [ -s "$tmp" ]; then
  xargs -0 zig fmt < "$tmp"
fi
"""

[tasks."zig:fmt:check"]
description = "Check Zig formatting"
run = """
set -eu
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard -z -- '*.zig' '*.zon' > "$tmp"
else
  find . -type d \\( -name .git -o -name .zig-cache -o -name zig-cache -o -name zig-out -o -name zig-pkg \\) -prune \
    -o -type f \\( -name '*.zig' -o -name '*.zon' \\) -print0 > "$tmp"
fi
if [ -s "$tmp" ]; then
  xargs -0 zig fmt --check < "$tmp"
fi
"""

[tasks."zig:lint"]
description = "Compile Zig in strict native modes"
run = ["zig build -Doptimize=Debug --summary all", "zig build -Doptimize=ReleaseSafe --summary all"]

[tasks."zig:test"]
description = "Run Zig tests"
run = "zig build test -Doptimize=Debug --summary all"

[tasks."zig:release"]
description = "Compile Zig release variants"
run = ["zig build -Doptimize=ReleaseFast --summary all", "zig build -Doptimize=ReleaseSmall --summary all"]

[tasks."zig:standards"]
description = "Run the Zig standards workflow with autofixes"
depends = ["zig:fmt"]

[tasks."zig:standards:check"]
description = "Run the Zig standards CI gate"
run = [
  { task = "zig:fmt:check" },
  { task = "zig:lint" },
  { task = "zig:test" },
  { task = "zig:release" },
]
