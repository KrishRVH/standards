[settings]
experimental = true

[tools]
"pkgx:llvm.org" = "22.1.8"
clang-format = "22.1.8"
cmake = "4.3.4"
ninja = "1.13.2"

[tasks."c:fmt"]
description = "Format C sources"
run = """
if command -v clang-format >/dev/null 2>&1; then
  find . -path './.git' -prune -o -type f \\( -name '*.c' -o -name '*.h' \\) -print0 \
    | xargs -0 clang-format -i
else
  echo "clang-format is required for C formatting." >&2
  exit 1
fi
"""

[tasks."c:fmt:check"]
description = "Check C source formatting"
run = """
tmp="$(mktemp -d)"
trap 'rm -rf "$tmp"' EXIT
if command -v git >/dev/null 2>&1 && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
  git ls-files --cached --others --exclude-standard '*.c' '*.h' > "$tmp/files"
else
  find . -type d \\( -name .git -o -name build -o -name 'build-*' \\) -prune \
    -o -type f \\( -name '*.c' -o -name '*.h' \\) -print > "$tmp/files"
fi
if [ ! -s "$tmp/files" ]; then
  exit 0
fi
while IFS= read -r file; do
  clang-format "$file" | cmp -s "$file" - || {
    echo "Needs formatting: $file" >&2
    exit 1
  }
done < "$tmp/files"
"""

[tasks."c:lint"]
description = "Run C static checks"
run = """
if [ -x ./c-quality.sh ]; then
  cmake --preset clang
  cmake --build --preset clang
  ./c-quality.sh . build/clang
else
  cmake --preset clang
  cmake --build --preset clang
fi
"""

[tasks."c:test"]
description = "Run C tests"
run = """
if [ -x ./c-build.sh ]; then
  ./c-build.sh
else
  cmake --preset clang
  cmake --build --preset clang
  ctest --preset clang
fi
"""

[tasks."c:check"]
description = "Run C formatting, linting, and tests"
run = """
mise run c:fmt:check
mise run c:lint
mise run c:test
"""

[tasks."c:ci"]
description = "Run the C CI gate"
depends = ["c:check"]
