[tasks."php:install"]
description = "Install PHP dependencies"
run = """
if ! command -v composer >/dev/null 2>&1; then
  echo "Composer is required for PHP tooling. Install Composer or provide it on PATH before running PHP tasks." >&2
  exit 1
fi

composer install --no-interaction
"""

[tasks."php:fmt"]
description = "Auto-fix PHP style issues"
depends = ["php:install"]
run = "composer phpcbf"

[tasks."php:fmt:check"]
description = "Check PHP formatting/style"
depends = ["php:install"]
run = "composer phpcs"

[tasks."php:lint"]
description = "Run PHP lint/static-analysis checks"
depends = ["php:install"]
run = "composer lint"

[tasks."php:test"]
description = "Run PHP tests"
depends = ["php:install"]
run = "composer test"

[tasks."php:check"]
description = "Run the PHP project check script"
depends = ["php:install"]
run = "composer check"
