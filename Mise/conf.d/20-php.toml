[env]
PHP_CONFIGURE_OPTIONS = "--with-openssl --with-readline --with-gettext"

[tools]
php = "8.5.7"

[tasks."php:install"]
description = "Install PHP dependencies"
run = """
if ! command -v composer >/dev/null 2>&1; then
  echo "Composer is required for PHP tooling. Install Composer or provide it on PATH before running PHP tasks." >&2
  exit 1
fi

composer install --no-interaction
"""

[tasks."php:lock"]
description = "Refresh the PHP Composer lockfile"
run = "composer update --no-interaction --no-install"

[tasks."php:fmt"]
description = "Auto-fix PHP style issues"
depends = ["php:install"]
run = "composer phpcbf"

[tasks."php:fmt:check"]
description = "Check PHP formatting/style"
depends = ["php:install"]
run = "composer phpcs"

[tasks."php:lint"]
description = "Run PHP lint/static-analysis checks"
depends = ["php:install"]
run = "composer lint"

[tasks."php:test"]
description = "Run PHP tests"
depends = ["php:install"]
run = "composer test"

[tasks."php:standards"]
description = "Run the PHP standards workflow with autofixes"
depends = ["php:install"]
run = "composer standards"

[tasks."php:standards:check"]
description = "Run the PHP standards CI gate"
depends = ["php:install"]
run = "composer standards:check"
