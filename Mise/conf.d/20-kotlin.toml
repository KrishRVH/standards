[tools]
java = "temurin-25.0.3+9.0.LTS"
gradle = "9.5.1"
ktlint = "1.8.0"

[tasks."kotlin:fmt"]
description = "Format Kotlin and Gradle Kotlin DSL"
run = "ktlint -F '**/*.kt' '**/*.kts' '!**/build/**' '!**/.gradle/**' '!**/.kotlin/**'"

[tasks."kotlin:fmt:check"]
description = "Check Kotlin formatting"
run = "ktlint '**/*.kt' '**/*.kts' '!**/build/**' '!**/.gradle/**' '!**/.kotlin/**'"

[tasks."kotlin:lint"]
description = "Run Kotlin static analysis and main-source compilation"
run = "gradle --no-daemon --warning-mode=fail detektMain detektTest classes"

[tasks."kotlin:test"]
description = "Run Kotlin/JVM tests"
run = "gradle --no-daemon --warning-mode=fail test"

[tasks."kotlin:locks"]
description = "Refresh Gradle dependency locks"
run = "gradle --no-daemon --warning-mode=fail --write-locks --write-verification-metadata sha256 detektMain detektTest classes test"

[tasks."kotlin:verification-metadata"]
description = "Refresh Gradle dependency verification metadata"
run = "gradle --no-daemon --warning-mode=fail --write-verification-metadata sha256 detektMain detektTest classes test"

[tasks."kotlin:lock:check"]
description = "Ensure Gradle dependency locks and verification metadata are committed"
run = """
set -eu

missing=0
for path in gradle.lockfile gradle/verification-metadata.xml; do
  if [ ! -f "$path" ]; then
    echo "Missing $path. Run mise run kotlin:locks and mise run kotlin:verification-metadata, then commit the generated files." >&2
    missing=1
  fi
done
if [ "$missing" -eq 0 ]; then
  allowed_detekt_alpha='2.0.0-alpha.5'
  if ! awk -v allowed="$allowed_detekt_alpha" '
    BEGIN {
      quote = sprintf("%c", 34)
      detekt_group = "group=" quote "dev.detekt" quote
      detekt_version = "version=" quote allowed quote
      allowed_jar = "-" allowed ".jar" quote
      allowed_module = "-" allowed ".module" quote
      allowed_pom = "-" allowed ".pom" quote
      intellij_group = "group=" quote "org.jetbrains.intellij.deps.kotlinx" quote
      intellij_version = "version=" quote "1.10.2-intellij-1" quote
      intellij_bom = "name=" quote "kotlinx-coroutines-bom" quote
      intellij_core = "name=" quote "kotlinx-coroutines-core" quote
      intellij_core_jvm = "name=" quote "kotlinx-coroutines-core-jvm" quote
      intellij_jar = "-1.10.2-intellij-1.jar" quote
      intellij_module = "-1.10.2-intellij-1.module" quote
      intellij_pom = "-1.10.2-intellij-1.pom" quote
    }

    function has_blocked_qualifier(line) {
      if (line ~ /[.-](alpha|Alpha|beta|Beta|rc|RC|m|M)([0-9.]|$)/) {
        return 1
      }
      if (line ~ /[.-](milestone|Milestone)([0-9.]|$)/) {
        return 1
      }
      if (line ~ /[.-](eap|EAP|preview|Preview|intellij|Intellij|IntelliJ)([0-9.-]|$)/) {
        return 1
      }
      return line ~ /SNAPSHOT/
    }

    function is_allowed_detekt_xml_line(line) {
      if (index(line, detekt_version) > 0) {
        return 1
      }
      if (index(line, allowed_jar) > 0) {
        return 1
      }
      if (index(line, allowed_module) > 0) {
        return 1
      }
      if (index(line, allowed_pom) > 0) {
        return 1
      }
      return 0
    }

    function is_allowed_intellij_lock_line(line) {
      return line ~ /^org[.]jetbrains[.]intellij[.]deps[.]kotlinx:kotlinx-coroutines-(bom|core|core-jvm):1[.]10[.]2-intellij-1=detekt$/
    }

    function is_allowed_intellij_component(line) {
      if ((index(line, intellij_group) == 0) || (index(line, intellij_version) == 0)) {
        return 0
      }
      return (index(line, intellij_bom) > 0) ||
        (index(line, intellij_core) > 0) ||
        (index(line, intellij_core_jvm) > 0)
    }

    function is_allowed_intellij_xml_line(line) {
      if (index(line, intellij_version) > 0) {
        return 1
      }
      if (index(line, intellij_jar) > 0) {
        return 1
      }
      if (index(line, intellij_module) > 0) {
        return 1
      }
      if (index(line, intellij_pom) > 0) {
        return 1
      }
      return 0
    }

    FNR == 1 {
      in_allowed_detekt_component = 0
      in_allowed_intellij_component = 0
    }

    FILENAME ~ /verification-metadata[.]xml$/ && /<component / {
      in_allowed_detekt_component = ((index($0, detekt_group) > 0) && (index($0, detekt_version) > 0))
      in_allowed_intellij_component = is_allowed_intellij_component($0)
    }

    has_blocked_qualifier($0) {
      if (FILENAME ~ /gradle[.]lockfile$/ && $0 ~ /^dev[.]detekt:/ && index($0, ":" allowed "=") > 0) {
        next
      }
      if (FILENAME ~ /gradle[.]lockfile$/ && is_allowed_intellij_lock_line($0)) {
        next
      }
      if (FILENAME ~ /verification-metadata[.]xml$/ && in_allowed_detekt_component && is_allowed_detekt_xml_line($0)) {
        next
      }
      if (FILENAME ~ /verification-metadata[.]xml$/ && in_allowed_intellij_component && is_allowed_intellij_xml_line($0)) {
        next
      }
      print FILENAME ":" FNR ":" $0
      found = 1
    }

    FILENAME ~ /verification-metadata[.]xml$/ && /<[/]component>/ {
      in_allowed_detekt_component = 0
      in_allowed_intellij_component = 0
    }

    END { exit found }
  ' gradle.lockfile gradle/verification-metadata.xml; then
    echo "Kotlin generated artifacts contain unapproved prerelease or qualified coordinates." >&2
    missing=1
  fi
fi
exit "$missing"
"""

[tasks."kotlin:standards"]
description = "Run the Kotlin standards workflow with autofixes"
run = "mise run kotlin:fmt"

[tasks."kotlin:standards:check"]
description = "Run the Kotlin standards CI gate"
run = """
mise run kotlin:lock:check
mise run kotlin:fmt:check
mise run kotlin:lint
mise run kotlin:test
"""
