[tools]
lua = "5.5.0"
stylua = "2.5.2"

[tasks."lua:install"]
description = "Install Lua project tooling"
run = """
if ! command -v luarocks >/dev/null 2>&1; then
  echo "luarocks is required for Lua tooling." >&2
  exit 1
fi

if [ ! -x .lua_modules/bin/luacheck ]; then
  luarocks --tree .lua_modules install luacheck
fi

if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  if [ ! -x .lua_modules/bin/busted ]; then
    luarocks --tree .lua_modules install busted
  fi
fi
"""

[tasks."lua:fmt"]
description = "Format Lua code"
run = "stylua ."

[tasks."lua:fmt:check"]
description = "Check Lua formatting"
run = "stylua --check ."

[tasks."lua:lint"]
description = "Run Luacheck"
depends = ["lua:install"]
run = """
eval "$(luarocks --tree .lua_modules path)"
luacheck --exclude-files .lua_modules/** -- .
"""

[tasks."lua:test"]
description = "Run Lua tests when a test runner is configured"
depends = ["lua:install"]
run = """
if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  eval "$(luarocks --tree .lua_modules path)"
  busted
else
  echo "No Lua test runner detected."
fi
"""

[tasks."lua:check"]
description = "Run Lua formatting, linting, and tests"
depends = ["lua:fmt:check", "lua:lint", "lua:test"]

[tasks."lua:ci"]
description = "Run the Lua CI gate"
depends = ["lua:check"]
