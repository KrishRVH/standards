[tools]
lua = "5.5.0"
lua-language-server = "3.18.2"
stylua = "2.5.2"

[tasks."lua:install"]
description = "Install Lua project test tooling"
run = """
if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  if ! command -v luarocks >/dev/null 2>&1; then
    echo "luarocks is required for Lua test tooling." >&2
    exit 1
  fi

  if [ ! -x .lua_modules/bin/busted ]; then
    luarocks --tree .lua_modules install busted
  fi
fi
"""

[tasks."lua:fmt"]
description = "Format Lua code"
run = "stylua ."

[tasks."lua:fmt:check"]
description = "Check Lua formatting"
run = "stylua --check ."

[tasks."lua:lint"]
description = "Run LuaLS diagnostics"
run = """
tmp="$(mktemp)"
trap 'rm -f "$tmp"' EXIT

if ! lua-language-server --check=. --check_format=pretty --checklevel=Warning --logpath=.lua-language-server/log >"$tmp" 2>&1; then
  cat "$tmp"
  exit 1
fi

cat "$tmp"
if ! grep -Eq "Diagnosis complete(d)?, (0|no) problems found" "$tmp"; then
  exit 1
fi
"""

[tasks."lua:test"]
description = "Run Lua tests when a test runner is configured"
depends = ["lua:install"]
run = """
if [ -f busted.lua ] || [ -d spec ] || [ -d specs ]; then
  eval "$(luarocks --tree .lua_modules path)"
  busted
else
  echo "No Lua test runner detected."
fi
"""

[tasks."lua:check"]
description = "Run Lua formatting, linting, and tests"
run = """
mise run lua:fmt:check
mise run lua:lint
mise run lua:test
"""

[tasks."lua:ci"]
description = "Run the Lua CI gate"
depends = ["lua:check"]
