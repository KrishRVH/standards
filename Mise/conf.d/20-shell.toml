[tools]
bats = "1.13.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"

[tasks."shell:run"]
description = "Run a shell standards subcommand: fmt, fmt-check, lint, syntax, policy, or test"
usage = "arg \"command\""
run = "scripts/shell-standards.sh \"$usage_command\""

[tasks."shell:fmt"]
description = "Format shell scripts"
run = "scripts/shell-standards.sh fmt"

[tasks."shell:fmt:check"]
description = "Check shell script formatting"
run = "scripts/shell-standards.sh fmt-check"

[tasks."shell:lint"]
description = "Run shell static analysis, syntax checks, and shebang policy"
wait_for = ["shell:fmt:check"]
run = "scripts/shell-standards.sh lint"

[tasks."shell:syntax"]
description = "Run shell parser checks"
run = "scripts/shell-standards.sh syntax"

[tasks."shell:policy"]
description = "Check shell glue-script shebang policy"
run = "scripts/shell-standards.sh policy"

[tasks."shell:test"]
description = "Run Bats shell tests"
wait_for = ["shell:fmt:check"]
run = "scripts/shell-standards.sh test"

[tasks."shell:standards"]
description = "Run the shell standards workflow with autofixes"
depends = ["shell:fmt"]

[tasks."shell:standards:check"]
description = "Run the shell standards CI gate"
depends = ["shell:fmt:check", "shell:lint", "shell:test"]
