# Copy to .config/mise/config.toml.

[settings]
lockfile = true

[tools]
# Keep Dagger pinned here so both local CI runs and hosted CI use the same CLI.
dagger = "0.21.7"

[tasks.install]
description = "Install pinned project tools"
run = "mise install"

[tasks.lock]
description = "Refresh mise.lock after tool-version changes"
run = "mise lock"

[tasks.doctor]
description = "Inspect mise configuration and installed tools"
run = "mise doctor"

[tasks.tasks]
description = "List available project tasks"
run = "mise tasks"

[tasks.fmt]
description = "Format the project using detected language tasks"
run = """
set -eu
ran=0

if [ -f composer.json ]; then
  mise run php:fmt
  ran=1
fi

if [ -f pyproject.toml ]; then
  mise run py:fmt
  ran=1
fi

if [ -f package.json ]; then
  mise run ts:fmt
  ran=1
fi

if [ -f Cargo.toml ]; then
  mise run rust:fmt
  ran=1
fi

if [ -f go.mod ]; then
  mise run go:fmt
  ran=1
fi

if [ -f mix.exs ]; then
  mise run elixir:fmt
  ran=1
fi

if [ -f cabal.project ] || find . -maxdepth 2 -name '*.cabal' -print -quit | grep -q .; then
  mise run haskell:fmt
  ran=1
fi

if [ -f settings.gradle.kts ] || [ -f build.gradle.kts ]; then
  mise run kotlin:fmt
  ran=1
fi

if [ -f build.zig ]; then
  mise run zig:fmt
  ran=1
fi

if [ -f CMakeLists.txt ] && find . -maxdepth 4 \\( -name '*.cc' -o -name '*.cpp' -o -name '*.cxx' -o -name '*.hh' -o -name '*.hpp' -o -name '*.hxx' -o -name '*.ixx' -o -name '*.cppm' -o -name '*.cxxm' \\) -print -quit | grep -q .; then
  mise run cpp:fmt
  ran=1
fi

if [ -f CMakeLists.txt ] && find . -maxdepth 4 -name '*.c' -print -quit | grep -q .; then
  mise run c:fmt
  ran=1
fi

if find . -maxdepth 3 \\( -name '*.sln' -o -name '*.csproj' \\) -print -quit | grep -q .; then
  mise run csharp:fmt
  ran=1
fi

if [ -f stylua.toml ] || [ -f .luarc.json ]; then
  mise run lua:fmt
  ran=1
fi

if [ "$ran" = 0 ]; then
  echo "No formatter tasks detected."
fi
"""

